<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modo al volante</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><main class="container py-4"><div class="d-flex justify-content-between align-items-center mb-3"><div><h2 class="fw-bold mb-0">Modo al volante</h2><p class="text-secondary mb-0">Vista rapida para entregas pendientes.</p></div><button class="btn btn-outline-dark" onclick="load()">Actualizar</button></div><div id="list" class="row g-3"></div></main><div class="modal fade" id="m"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 class="modal-title">Firma digital</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><p class="text-secondary">El cliente firma para confirmar recepcion del pedido.</p><canvas id="firma" class="signature" width="700" height="220"></canvas></div><div class="modal-footer"><button class="btn btn-outline-secondary" id="limpiar">Limpiar</button><button class="btn btn-dark" id="confirmar">Completar entrega</button></div></div></div></div><script>nav('kevin');let selected=null,sig=null,modal=null;authGuard().then(()=>{modal=new bootstrap.Modal('#m');sig=initSignature('firma');load()});async function load(){const envios=(await API.get('/api/envios?estado=pendiente')).filter(e=>e.estado!=='entregado');list.innerHTML=envios.map(e=>{const phone=e.celularCliente||e.transportadoraTelefono;const map=e.tipoEnvio==='transportadora'?e.transportadoraMaps:e.googleMaps;const dir=e.tipoEnvio==='transportadora'?e.transportadoraDireccion:e.direccionLiteral;return `<div class="col-12 col-lg-6"><div class="card driver-card p-3"><div class="d-flex justify-content-between"><h4 class="fw-bold">${e.cliente||e.transportadoraNombre}</h4><span class="badge text-bg-warning">${e.estado}</span></div><p class="mb-1"><b>Producto:</b> ${e.producto}</p><p class="mb-1"><b>Destino:</b> ${e.destinoDepartamento}</p><p class="mb-1"><b>Direccion:</b> ${dir||'Sin direccion'}</p><p class="mb-2"><b>Total:</b> ${money(e.total)}</p><div class="row g-2"><div class="col-6"><a class="btn btn-success btn-lgx w-100" href="${waLink(phone)}" target="_blank">WhatsApp</a></div><div class="col-6"><a class="btn btn-outline-success btn-lgx w-100" href="${telLink(phone)}">Llamar</a></div><div class="col-12"><a class="btn btn-primary btn-lgx w-100 ${map?'':'disabled'}" href="${mapsLink(map)}" target="_blank">Abrir Google Maps</a></div><div class="col-12"><button class="btn btn-dark btn-lgx w-100" onclick="openSign('${e.id}')">Marcar entregado</button></div></div></div></div>`}).join('')||'<div class="card p-4"><p class="mb-0 text-secondary">No hay envios pendientes.</p></div>'}function openSign(id){selected=id;sig.clear();modal.show()}limpiar.onclick=()=>sig.clear();confirmar.onclick=async()=>{await API.post(`/api/envios/${selected}/entregar`,{firmaCliente:sig.data()});modal.hide();toast('Entrega completada');load()};</script></body></html>
