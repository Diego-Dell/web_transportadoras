<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Historial</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><main class="container py-4"><div class="card p-3 mb-3"><h2 class="fw-bold">Historial</h2><form id="filters" class="row g-2"><div class="col-md-3"><label class="form-label">Desde</label><input type="date" name="desde" class="form-control"></div><div class="col-md-3"><label class="form-label">Hasta</label><input type="date" name="hasta" class="form-control"></div><div class="col-md-2"><label class="form-label">Estado</label><select name="estado" class="form-select"><option value="">Todos</option><option value="pendiente">Pendiente</option><option value="entregado">Entregado</option></select></div><div class="col-md-2"><label class="form-label">Tipo</label><select name="tipo" class="form-select"><option value="">Todos</option><option value="santa_cruz">Santa Cruz</option><option value="transportadora">Transportadora</option></select></div><div class="col-md-2 d-flex align-items-end gap-2"><button class="btn btn-dark w-100">Filtrar</button></div><div class="col-12"><button type="button" class="btn btn-outline-danger" onclick="exportPdf()">Exportar PDF</button></div></form></div><div class="card p-3"><div class="table-responsive"><table class="table table-hover"><thead><tr><th>Fecha</th><th>Usuario</th><th>Cliente</th><th>Producto</th><th>Destino</th><th>Tipo</th><th>Estado</th><th>Total</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></div></main><script>nav('historial');authGuard().then(load);filters.onsubmit=e=>{e.preventDefault();load()};function qs(){return new URLSearchParams(Object.fromEntries(new FormData(filters))).toString()}async function load(){const data=await API.get('/api/envios?'+qs());tbody.innerHTML=data.map(e=>{const phone=e.celularCliente||e.transportadoraTelefono;const map=e.tipoEnvio==='transportadora'?e.transportadoraMaps:e.googleMaps;return `<tr><td>${e.fecha}</td><td>${e.creadoPor}</td><td>${e.cliente}</td><td>${e.producto}</td><td>${e.destinoDepartamento}</td><td>${e.tipoEnvio}</td><td>${e.estado}</td><td>${money(e.total)}</td><td><div class="btn-group btn-group-sm"><a class="btn btn-outline-success" href="${waLink(phone)}" target="_blank">WhatsApp</a><a class="btn btn-outline-primary ${map?'':'disabled'}" href="${mapsLink(map)}" target="_blank">Maps</a></div></td></tr>`}).join('')}function exportPdf(){window.open('/api/export/pdf?'+qs(),'_blank')}</script></body></html>
