<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Historial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/sistema/styles.css?v=8" rel="stylesheet">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/sistema/app.js?v=8"></script>

<main class="container-xl page-shell">
  <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4">
    <div>
      <h1 class="page-title">Historial</h1>
      <p class="page-subtitle">Filtra, revisa firmas y exporta los envíos por rango de fechas.</p>
    </div>
    <button class="btn btn-dark" onclick="exportPdf()">Exportar PDF</button>
  </div>

  <div class="app-card mb-3">
    <form id="filters" class="row g-3 align-items-end">
      <div class="col-md-3"><label class="form-label">Desde</label><input type="date" name="desde" class="form-control"></div>
      <div class="col-md-3"><label class="form-label">Hasta</label><input type="date" name="hasta" class="form-control"></div>
      <div class="col-md-2"><label class="form-label">Estado</label><select name="estado" class="form-select"><option value="">Todos</option><option value="pendiente">Pendiente</option><option value="entregado">Entregado</option></select></div>
      <div class="col-md-2"><label class="form-label">Tipo</label><select name="tipo" class="form-select"><option value="">Todos</option><option value="santa_cruz">Cliente Santa Cruz</option><option value="transportadora">Transportadora</option></select></div>
      <div class="col-md-2"><button class="btn btn-outline-dark w-100">Buscar</button></div>
    </form>
  </div>

  <div class="app-card">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead><tr><th>Fecha</th><th>Cliente / transportadora</th><th>Producto</th><th>Destino</th><th>Contacto</th><th>Estado</th><th>Total</th><th>Acciones</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal fade" id="signatureViewer" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title fw-bold">Firma de recepción</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body text-center">
        <div id="signatureInfo" class="small text-secondary mb-3"></div>
        <div class="signature-viewer"><img id="signatureImage" alt="Firma digital del cliente"></div>
      </div>
    </div>
  </div>
</div>

<script>
const viewer = new bootstrap.Modal(document.getElementById('signatureViewer'));
setupPage('historial').then(load);
filters.onsubmit = event => { event.preventDefault(); load(); };

function queryString() {
  return new URLSearchParams(new FormData(filters)).toString();
}

async function load() {
  const envios = await API.get(`/api/envios?${queryString()}`);
  tbody.innerHTML = envios.map(envio => {
    const phone = envio.celularCliente || envio.transportadoraTelefono;
    const mapUrl = envio.tipoEnvio === 'transportadora' ? envio.transportadoraMaps : envio.googleMaps;
    const address = envio.tipoEnvio === 'transportadora' ? envio.transportadoraDireccion : envio.direccionLiteral;
    const name = envio.tipoEnvio === 'transportadora' ? (envio.transportadoraNombre || envio.cliente) : envio.cliente;
    const hasMap = Boolean(mapUrl || address);
    const hasSignature = Boolean(envio.firmaCliente);
    return `
      <tr>
        <td>${escapeHtml(envio.fecha || '')}<div class="small text-secondary">${escapeHtml(envio.creadoPor || '')}</div></td>
        <td><b>${escapeHtml(name || 'Sin dato')}</b><div class="small text-secondary">${escapeHtml(tipoLabel(envio.tipoEnvio))}</div></td>
        <td>${escapeHtml(envio.producto || '')}</td>
        <td>${escapeHtml(envio.destinoDepartamento || '')}</td>
        <td><a href="${escapeAttr(waLink(phone))}" target="_blank" rel="noopener">${escapeHtml(phone || '')}</a></td>
        <td>${statusBadge(envio.estado)}</td>
        <td><b>${escapeHtml(money(envio.total))}</b></td>
        <td>
          <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-sm btn-outline-primary ${hasMap ? '' : 'disabled'}" href="${escapeAttr(mapsLink(mapUrl, address))}" target="_blank" rel="noopener">Maps</a>
            <a class="btn btn-sm btn-outline-success ${phone ? '' : 'disabled'}" href="${escapeAttr(waLink(phone))}" target="_blank" rel="noopener">WhatsApp</a>
            <button class="btn btn-sm btn-outline-dark ${hasSignature ? '' : 'disabled'}" ${hasSignature ? `onclick="showSignature('${escapeAttr(envio.firmaCliente)}','${escapeAttr(envio.entregadoPor || '')}','${escapeAttr(envio.entregadoAt || '')}')"` : 'disabled'}>Ver firma</button>
          </div>
        </td>
      </tr>`;
  }).join('') || `<tr><td colspan="8">${emptyState('Sin resultados', 'No hay envíos con esos filtros.')}</td></tr>`;
}

function showSignature(source, deliveredBy, deliveredAt) {
  signatureImage.src = source;
  signatureInfo.textContent = `Entregado por ${deliveredBy || 'Kevin'}${deliveredAt ? ` · ${new Date(deliveredAt).toLocaleString('es-BO')}` : ''}`;
  viewer.show();
}

function exportPdf() { location.href = `/api/export/pdf?${queryString()}`; }
</script>
</body>
</html>
