<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Registrar envio</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><main class="container py-4"><div class="card p-3 p-md-4"><h2 class="fw-bold">Registrar envio</h2><p class="text-secondary">Carga los datos de la entrega o de la transportadora.</p><form id="f" class="row g-3"><div class="col-md-3"><label class="form-label">Fecha</label><input type="date" name="fecha" class="form-control" required></div><div class="col-md-3"><label class="form-label">Tipo</label><select name="tipoEnvio" id="tipo" class="form-select"><option value="santa_cruz">Cliente en Santa Cruz</option><option value="transportadora">Transportadora</option></select></div><div class="col-md-3"><label class="form-label">Origen</label><input name="origen" class="form-control" value="Santa Cruz"></div><div class="col-md-3"><label class="form-label">Destino departamento</label><select name="destinoDepartamento" class="form-select"><option>Santa Cruz</option><option>Cochabamba</option><option>La Paz</option><option>Tarija</option><option>Chuquisaca</option><option>Beni</option><option>Pando</option><option>Oruro</option><option>Potosi</option></select></div><div class="col-md-6"><label class="form-label">Cliente</label><input name="cliente" class="form-control" required></div><div class="col-md-3"><label class="form-label">Celular cliente</label><input name="celularCliente" class="form-control"></div><div class="col-md-3"><label class="form-label">Forma de pago</label><input name="formaPago" class="form-control" placeholder="Efectivo, QR, transferencia"></div><div class="col-md-6"><label class="form-label">Producto</label><input name="producto" class="form-control" required></div><div class="col-md-2"><label class="form-label">Cantidad</label><input type="number" name="cantidad" id="cantidad" class="form-control" value="1"></div><div class="col-md-2"><label class="form-label">Precio unitario</label><input type="number" step="0.01" name="precioUnitario" id="precio" class="form-control" value="0"></div><div class="col-md-2"><label class="form-label">Total</label><input type="number" step="0.01" name="total" id="total" class="form-control" value="0"></div><div class="col-12 santa"><label class="form-label">Direccion literal del cliente</label><input name="direccionLiteral" class="form-control"></div><div class="col-12 santa"><label class="form-label">Link de Google Maps</label><input name="googleMaps" class="form-control" placeholder="https://maps.google.com/..."></div><div class="col-12 trans d-none"><div class="row g-3"><div class="col-md-4"><label class="form-label">Transportadora</label><input list="listaTransportadoras" name="transportadoraNombre" id="transportadoraNombre" class="form-control"><datalist id="listaTransportadoras"></datalist></div><div class="col-md-3"><label class="form-label">Telefono transportadora</label><input name="transportadoraTelefono" id="transportadoraTelefono" class="form-control"></div><div class="col-md-5"><label class="form-label">Direccion transportadora</label><input name="transportadoraDireccion" id="transportadoraDireccion" class="form-control"></div><div class="col-12"><label class="form-label">Google Maps transportadora</label><input name="transportadoraMaps" id="transportadoraMaps" class="form-control"></div></div></div><div class="col-12"><label class="form-label">Observaciones</label><textarea name="observaciones" class="form-control" rows="3"></textarea></div><div class="col-12"><button class="btn btn-dark btn-lg">Guardar envio</button></div></form></div></main><script>nav('nuevo');let transportadoras=[];authGuard().then(init);async function init(){f.fecha.value=new Date().toISOString().slice(0,10);transportadoras=await API.get('/api/transportadoras');listaTransportadoras.innerHTML=transportadoras.map(t=>`<option value="${t.nombre}"></option>`).join('')}tipo.onchange=()=>{document.querySelectorAll('.trans').forEach(x=>x.classList.toggle('d-none',tipo.value!=='transportadora'));document.querySelectorAll('.santa').forEach(x=>x.classList.toggle('d-none',tipo.value==='transportadora'))};cantidad.oninput=precio.oninput=()=>{total.value=(Number(cantidad.value||0)*Number(precio.value||0)).toFixed(2)};transportadoraNombre.onchange=()=>{const t=transportadoras.find(x=>x.nombre===transportadoraNombre.value);if(t){transportadoraTelefono.value=t.telefono||'';transportadoraDireccion.value=t.direccion||'';transportadoraMaps.value=t.maps||''}};f.onsubmit=async e=>{e.preventDefault();try{await API.post('/api/envios',Object.fromEntries(new FormData(f)));toast('Envio registrado');f.reset();f.fecha.value=new Date().toISOString().slice(0,10);tipo.onchange()}catch(x){toast(x.message,'danger')}};</script></body></html>
