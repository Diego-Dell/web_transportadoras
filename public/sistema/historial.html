<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Historial</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/sistema/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/sistema/app.js"></script><main class="container-xl page-shell"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4"><div><h1 class="page-title">Historial</h1><p class="page-subtitle">Filtra, revisa y exporta los envios por rango de fechas.</p></div><button class="btn btn-dark" onclick="exportPdf()">Exportar PDF</button></div><div class="app-card mb-3"><form id="filters" class="row g-3 align-items-end"><div class="col-md-3"><label class="form-label">Desde</label><input type="date" name="desde" class="form-control"></div><div class="col-md-3"><label class="form-label">Hasta</label><input type="date" name="hasta" class="form-control"></div><div class="col-md-2"><label class="form-label">Estado</label><select name="estado" class="form-select"><option value="">Todos</option><option value="pendiente">Pendiente</option><option value="entregado">Entregado</option></select></div><div class="col-md-2"><label class="form-label">Tipo</label><select name="tipo" class="form-select"><option value="">Todos</option><option value="santa_cruz">Cliente Santa Cruz</option><option value="transportadora">Transportadora</option></select></div><div class="col-md-2"><button class="btn btn-outline-dark w-100">Buscar</button></div></form></div><div class="app-card"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Fecha</th><th>Cliente / transportadora</th><th>Producto</th><th>Destino</th><th>Contacto</th><th>Estado</th><th>Total</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></div></main><script>setupPage('historial').then(load);filters.onsubmit=e=>{e.preventDefault();load()};function qs(){const p=new URLSearchParams(new FormData(filters));return p.toString()}async function load(){const envios=await API.get('/api/envios?'+qs());tbody.innerHTML=envios.map(e=>{const phone=e.celularCliente||e.transportadoraTelefono;const map=e.tipoEnvio==='transportadora'?e.transportadoraMaps:e.googleMaps;const name=e.tipoEnvio==='transportadora'?(e.transportadoraNombre||e.cliente):e.cliente;return `<tr><td>${e.fecha||''}<div class="small text-secondary">${e.creadoPor||''}</div></td><td><b>${name||'Sin dato'}</b><div class="small text-secondary">${tipoLabel(e.tipoEnvio)}</div></td><td>${e.producto||''}</td><td>${e.destinoDepartamento||''}</td><td><a href="${waLink(phone)}" target="_blank">${phone||''}</a></td><td>${statusBadge(e.estado)}</td><td><b>${money(e.total)}</b></td><td><div class="d-flex gap-2"><a class="btn btn-sm btn-outline-primary ${map?'':'disabled'}" href="${mapsLink(map)}" target="_blank">Maps</a><a class="btn btn-sm btn-outline-success ${phone?'':'disabled'}" href="${waLink(phone)}" target="_blank">WhatsApp</a></div></td></tr>`}).join('')||`<tr><td colspan="8">${emptyState('Sin resultados','No hay envios con esos filtros.')}</td></tr>`}function exportPdf(){location.href='/api/export/pdf?'+qs()}</script></body></html>
