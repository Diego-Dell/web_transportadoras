<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Transportadoras</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/sistema/styles.css?v=7" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/sistema/app.js?v=7"></script><main class="container-xl page-shell"><div class="mb-4"><h1 class="page-title">Transportadoras</h1><p class="page-subtitle">Administra contactos, direcciones y enlaces de Google Maps.</p></div><div class="row g-3"><div class="col-lg-4"><div class="app-card"><h5 class="fw-bold mb-3">Agregar o actualizar</h5><form id="f" class="row g-3"><div class="col-12"><label class="form-label">Nombre</label><input name="nombre" class="form-control" required></div><div class="col-12"><label class="form-label">Telefono</label><input name="telefono" class="form-control"></div><div class="col-12"><label class="form-label">Departamento</label><input name="departamento" class="form-control"></div><div class="col-12"><label class="form-label">Direccion</label><input name="direccion" class="form-control"></div><div class="col-12"><label class="form-label">Google Maps</label><input name="maps" class="form-control"></div><div class="col-12"><button class="btn btn-dark w-100">Guardar</button></div></form></div></div><div class="col-lg-8"><div class="app-card"><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Transportadora</th><th>Telefono</th><th>Departamento</th><th>Direccion</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></div></div></div></main><script>setupPage('transportadoras').then(load);async function load(){const data=await API.get('/api/transportadoras');tbody.innerHTML=data.map(t=>`<tr><td><b>${t.nombre}</b></td><td><a href="${waLink(t.telefono)}" target="_blank">${t.telefono||''}</a></td><td>${t.departamento||''}</td><td>${t.direccion||''}</td><td><div class="d-flex gap-2"><a class="btn btn-sm btn-outline-success ${t.telefono?'':'disabled'}" href="${waLink(t.telefono)}" target="_blank">WhatsApp</a><a class="btn btn-sm btn-outline-primary ${t.maps?'':'disabled'}" href="${mapsLink(t.maps)}" target="_blank">Maps</a></div></td></tr>`).join('')||`<tr><td colspan="5">${emptyState('Sin transportadoras','Agrega la primera transportadora.')}</td></tr>`}f.onsubmit=async e=>{e.preventDefault();try{await API.post('/api/transportadoras',Object.fromEntries(new FormData(f)));toast('Transportadora guardada');f.reset();load()}catch(x){toast(x.message,'danger')}}</script></body></html>
