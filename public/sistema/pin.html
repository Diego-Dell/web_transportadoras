<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cambiar PIN</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/sistema/styles.css?v=8" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/sistema/app.js?v=8"></script><main class="container page-shell"><div class="row justify-content-center"><div class="col-md-6 col-lg-5"><div class="app-card"><h1 class="page-title mb-2">Cambiar PIN</h1><p class="page-subtitle mb-4">Usa solamente numeros de 4 a 8 digitos.</p><form id="f"><div class="mb-3"><label class="form-label">PIN actual</label><input type="password" inputmode="numeric" name="currentPin" class="form-control form-control-lg" required></div><div class="mb-3"><label class="form-label">Nuevo PIN</label><input type="password" inputmode="numeric" name="newPin" class="form-control form-control-lg" pattern="[0-9]{4,8}" required><div class="small-muted mt-1">Debe tener entre 4 y 8 numeros.</div></div><button class="btn btn-dark btn-lg w-100">Actualizar PIN</button></form></div></div></div></main><script>setupPage();f.onsubmit=async e=>{e.preventDefault();try{await API.post('/api/change-pin',Object.fromEntries(new FormData(f)));toast('PIN actualizado');f.reset()}catch(x){toast(x.message,'danger')}}</script></body></html>
