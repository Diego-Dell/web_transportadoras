<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cambiar PIN</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><main class="container py-4"><div class="row justify-content-center"><div class="col-md-5"><div class="card p-4"><h2 class="fw-bold">Cambiar PIN</h2><form id="f"><div class="mb-3"><label class="form-label">PIN actual</label><input type="password" name="currentPin" class="form-control" required></div><div class="mb-3"><label class="form-label">Nuevo PIN</label><input type="password" name="newPin" class="form-control" pattern="[0-9]{4,8}" required><div class="small-muted">Debe tener entre 4 y 8 numeros.</div></div><button class="btn btn-dark w-100">Actualizar</button></form></div></div></div></main><script>nav();authGuard();f.onsubmit=async e=>{e.preventDefault();try{await API.post('/api/change-pin',Object.fromEntries(new FormData(f)));toast('PIN actualizado');f.reset()}catch(x){toast(x.message,'danger')}}</script></body></html>
