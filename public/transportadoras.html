<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Transportadoras</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><main class="container py-4"><div class="row g-3"><div class="col-lg-4"><div class="card p-3"><h3 class="fw-bold">Agregar transportadora</h3><form id="f" class="row g-2"><div class="col-12"><label class="form-label">Nombre</label><input name="nombre" class="form-control" required></div><div class="col-12"><label class="form-label">Telefono</label><input name="telefono" class="form-control"></div><div class="col-12"><label class="form-label">Departamento</label><input name="departamento" class="form-control"></div><div class="col-12"><label class="form-label">Direccion</label><input name="direccion" class="form-control"></div><div class="col-12"><label class="form-label">Google Maps</label><input name="maps" class="form-control"></div><div class="col-12"><button class="btn btn-dark w-100">Guardar</button></div></form></div></div><div class="col-lg-8"><div class="card p-3"><h3 class="fw-bold">Listado</h3><div class="table-responsive"><table class="table"><thead><tr><th>Nombre</th><th>Telefono</th><th>Direccion</th><th>Maps</th></tr></thead><tbody id="tbody"></tbody></table></div></div></div></div></main><script>nav('transportadoras');authGuard().then(load);async function load(){const data=await API.get('/api/transportadoras');tbody.innerHTML=data.map(t=>`<tr><td>${t.nombre}</td><td><a href="${waLink(t.telefono)}" target="_blank">${t.telefono||''}</a></td><td>${t.direccion||''}</td><td><a class="btn btn-sm btn-outline-primary ${t.maps?'':'disabled'}" href="${mapsLink(t.maps)}" target="_blank">Abrir</a></td></tr>`).join('')}f.onsubmit=async e=>{e.preventDefault();await API.post('/api/transportadoras',Object.fromEntries(new FormData(f)));toast('Guardado');f.reset();load()}</script></body></html>
