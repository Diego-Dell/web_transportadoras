<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modo al volante</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/sistema/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/sistema/app.js"></script><main class="container-xl page-shell"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4"><div><h1 class="page-title">Modo al volante</h1><p class="page-subtitle">Vista exclusiva para Kevin. Acciones grandes para entregar rapido desde celular.</p></div><button class="btn btn-outline-dark" onclick="load()">Actualizar</button></div><div id="alertBox"></div><div id="list" class="row g-3"></div></main><div class="modal fade" id="m" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><div class="modal-header"><div><h5 class="modal-title fw-bold">Firma digital del cliente</h5><p class="text-secondary small mb-0">El cliente firma para confirmar que recibio el pedido.</p></div><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><canvas id="firma" class="signature"></canvas></div><div class="modal-footer"><button class="btn btn-outline-secondary" id="limpiar">Limpiar</button><button class="btn btn-dark" id="confirmar">Completar entrega</button></div></div></div></div><script>let selected=null,sig=null,modal=null;authGuard().then(({user})=>{if(String(user.username).toLowerCase()!=='kevin'&&user.role!=='driver'){document.body.innerHTML='<main class="container py-5"><div class="app-card"><h2 class="fw-bold">Acceso restringido</h2><p class="text-secondary">El modo al volante esta disponible solamente para Kevin.</p><a class="btn btn-dark" href="/sistema/index.html">Volver al dashboard</a></div></main>';return}nav('kevin',user);modal=new bootstrap.Modal('#m');sig=initSignature('firma');load()});async function load(){try{const envios=await API.get('/api/driver/envios');list.innerHTML=envios.map(card).join('')||emptyState('No hay envios pendientes','Cuando se registren envios pendientes apareceran aqui.')}catch(x){alertBox.innerHTML=`<div class="alert alert-danger">${x.message}</div>`}}function card(e){const phone=e.celularCliente||e.transportadoraTelefono;const map=e.tipoEnvio==='transportadora'?e.transportadoraMaps:e.googleMaps;const dir=e.tipoEnvio==='transportadora'?e.transportadoraDireccion:e.direccionLiteral;const name=e.tipoEnvio==='transportadora'?(e.transportadoraNombre||e.cliente):e.cliente;return `<div class="col-12 col-xl-6"><div class="driver-card bg-white p-3 p-md-4"><div class="d-flex justify-content-between gap-2 align-items-start"><div><h2 class="driver-title">${name||'Sin nombre'}</h2><div class="driver-meta">${tipoLabel(e.tipoEnvio)} · ${e.destinoDepartamento||'Sin destino'}</div></div>${statusBadge(e.estado)}</div><div class="driver-data"><div class="row g-3"><div class="col-12"><b>Producto</b><span>${e.producto||'Sin producto'}</span></div><div class="col-6"><b>Cantidad</b><span>${e.cantidad||1}</span></div><div class="col-6"><b>Total</b><span>${money(e.total)}</span></div><div class="col-12"><b>Direccion</b><span>${dir||'Sin direccion'}</span></div><div class="col-12"><b>Registrado por</b><span>${e.creadoPor||''}</span></div></div></div>${map?`<div class="map-preview mb-3"><iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="${mapPreviewSrc(map,dir)}"></iframe></div>`:''}<div class="row g-2"><div class="col-6"><a class="btn btn-success btn-lgx w-100 ${phone?'':'disabled'}" href="${waLink(phone)}" target="_blank">WhatsApp</a></div><div class="col-6"><a class="btn btn-outline-success btn-lgx w-100 ${phone?'':'disabled'}" href="${telLink(phone)}">Llamar</a></div><div class="col-12"><a class="btn btn-primary btn-lgx w-100 ${map?'':'disabled'}" href="${mapsLink(map)}" target="_blank">Abrir Google Maps</a></div><div class="col-12"><button class="btn btn-dark btn-lgx w-100" onclick="openSign('${e.id}')">Completar con firma</button></div></div></div></div>`}function openSign(id){selected=id;sig.clear();modal.show()}limpiar.onclick=()=>sig.clear();confirmar.onclick=async()=>{try{await API.post(`/api/envios/${selected}/entregar`,{firmaCliente:sig.data()});modal.hide();toast('Entrega completada');load()}catch(x){toast(x.message,'danger')}};</script></body></html>
