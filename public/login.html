<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><main class="login-wrap"><div class="container"><div class="row justify-content-center"><div class="col-md-6 col-lg-4"><div class="card login-panel"><div class="login-brand">SE</div><h2 class="fw-bold mb-1">Sistema de Envios</h2><p class="text-secondary mb-4">Accede con tu usuario y PIN.</p><form id="f"><div class="mb-3"><label class="form-label">Usuario</label><input class="form-control form-control-lg" name="username" autocomplete="username" required autofocus></div><div class="mb-3"><label class="form-label">PIN</label><input type="password" class="form-control form-control-lg" name="pin" inputmode="numeric" autocomplete="current-password" required></div><button class="btn btn-dark btn-lg w-100">Entrar</button><div id="err" class="alert alert-danger mt-3 d-none"></div></form></div></div></div></div></main><script src="/app.js"></script><script>f.onsubmit=async e=>{e.preventDefault();err.classList.add('d-none');try{const r=await API.post('/api/login',Object.fromEntries(new FormData(f)));location.href=(r.user?.username==='kevin1'||r.user?.role==='driver')?'/kevin.html':'/index.html'}catch(x){err.textContent=x.message;err.classList.remove('d-none')}}</script></body></html>
