<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/app.js"></script><script>nav('dashboard');authGuard().then(load);async function load(){const d=await API.get('/api/dashboard');document.querySelector('main').innerHTML=`
<div class="d-flex flex-wrap justify-content-between align-items-center mb-4"><div><h2 class="fw-bold mb-0">Dashboard</h2><p class="text-secondary mb-0">Resumen operativo de envios.</p></div><a class="btn btn-dark" href="/envios.html">Registrar envio</a></div>
<div class="row g-3 mb-4">${card('Total',d.total)}${card('Hoy',d.hoy)}${card('Semana',d.semana)}${card('Pendientes',d.pendientes)}${card('Entregados',d.entregados)}${card('Monto',money(d.totalMonto))}</div>
<div class="row g-3"><div class="col-lg-6"><div class="card p-3"><h5>Envios por usuario</h5>${list(d.porUsuario)}</div></div><div class="col-lg-6"><div class="card p-3"><h5>Envios por estado</h5>${list(d.porEstado)}</div></div><div class="col-12"><div class="card p-3"><h5>Recientes</h5><div class="table-responsive"><table class="table"><thead><tr><th>Cliente</th><th>Producto</th><th>Tipo</th><th>Estado</th><th>Total</th></tr></thead><tbody>${d.recientes.map(e=>`<tr><td>${e.cliente}</td><td>${e.producto}</td><td>${e.tipoEnvio}</td><td>${e.estado}</td><td>${money(e.total)}</td></tr>`).join('')}</tbody></table></div></div></div></div>`}function card(t,v){return `<div class="col-6 col-lg-2"><div class="card stat p-3"><div class="text-secondary small">${t}</div><div class="h3 fw-bold mt-2">${v}</div></div></div>`}function list(o){return `<div class="list-group list-group-flush">${Object.entries(o).map(([k,v])=>`<div class="list-group-item d-flex justify-content-between"><span>${k}</span><b>${v}</b></div>`).join('')||'<p class="text-secondary">Sin datos</p>'}</div>`}</script><main class="container py-4"></main></body></html>
