<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/sistema/styles.css" rel="stylesheet"></head><body><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/sistema/app.js"></script><main class="container-xl page-shell"><div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-4"><div><h1 class="page-title">Dashboard</h1><p class="page-subtitle">Resumen operativo de envios, entregas y montos registrados.</p></div><div class="d-flex gap-2"><a href="/sistema/envios.html" class="btn btn-dark">Registrar envio</a><a href="/sistema/historial.html" class="btn btn-outline-dark">Exportar</a></div></div><div id="dash"></div></main><script>setupPage('dashboard').then(load);async function load(){const d=await API.get('/api/dashboard');dash.innerHTML=`<div class="row g-3 mb-4">${card('Total envios',d.total)}${card('Hoy',d.hoy)}${card('Semana',d.semana)}${card('Pendientes',d.pendientes)}${card('Entregados',d.entregados)}${card('Monto',money(d.totalMonto))}</div><div class="row g-3"><div class="col-lg-4"><div class="app-card h-100"><h5 class="fw-bold mb-3">Por usuario</h5>${list(d.porUsuario)}</div></div><div class="col-lg-4"><div class="app-card h-100"><h5 class="fw-bold mb-3">Por estado</h5>${list(d.porEstado)}</div></div><div class="col-lg-4"><div class="app-card h-100"><h5 class="fw-bold mb-3">Por tipo</h5>${list(Object.fromEntries(Object.entries(d.porTipo).map(([k,v])=>[tipoLabel(k),v])))}</div></div><div class="col-12"><div class="app-card"><div class="d-flex justify-content-between align-items-center mb-3"><h5 class="fw-bold mb-0">Ultimos envios</h5><a href="/sistema/historial.html" class="btn btn-sm btn-outline-dark">Ver historial</a></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>Cliente</th><th>Producto</th><th>Tipo</th><th>Estado</th><th>Usuario</th><th>Total</th></tr></thead><tbody>${d.recientes.map(e=>`<tr><td><b>${e.cliente||e.transportadoraNombre||'Sin dato'}</b><div class="small text-secondary">${e.destinoDepartamento||''}</div></td><td>${e.producto||''}</td><td>${tipoLabel(e.tipoEnvio)}</td><td>${statusBadge(e.estado)}</td><td>${e.creadoPor||''}</td><td><b>${money(e.total)}</b></td></tr>`).join('')||`<tr><td colspan="6">${emptyState('Sin envios','Todavia no hay envios registrados.')}</td></tr>`}</tbody></table></div></div></div></div>`}function card(t,v){return `<div class="col-6 col-lg-2"><div class="app-card stat-card"><div class="stat-label">${t}</div><div class="stat-value">${v}</div></div></div>`}function list(o){const rows=Object.entries(o||{});return rows.length?`<div class="list-group list-group-flush">${rows.map(([k,v])=>`<div class="list-group-item px-0 d-flex justify-content-between align-items-center"><span>${k}</span><span class="badge text-bg-dark rounded-pill">${v}</span></div>`).join('')}</div>`:emptyState('Sin datos','Aun no hay informacion para mostrar.')}</script></body></html>
